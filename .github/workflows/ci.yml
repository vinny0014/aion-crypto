name: CI

on:
  push:
    branches: [main, develop, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configuration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Reject frontend path aliases
        shell: bash
        run: |
          set +e
          matches=$(grep -RInE "from ['\"]@/|import\\(['\"]@/|import ['\"]@/|require\\(['\"]@/|export .* from ['\"]@/" frontend/app frontend/components frontend/lib 2>&1)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            printf '%s\n' "$matches"
            echo "Frontend @/ imports are forbidden. Use relative paths."
            exit 1
          fi
          if [ "$status" -ne 1 ]; then
            printf '%s\n' "$matches"
            exit "$status"
          fi
          echo "No frontend @/ imports found."
      - run: python scripts/validate_project.py

  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aion_crypto_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres -d aion_crypto_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/aion_crypto_test
      POSTGRES_INTEGRATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/aion_crypto_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      - name: Validate migrations on empty PostgreSQL and prove idempotency
        run: python scripts/validate_migrations.py
      - run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Verify clean checkout module graph
        run: |
          test ! -d node_modules
          test ! -d .next
          git ls-files --error-unmatch -- \
            lib/fixtures.ts \
            lib/format.ts \
            lib/api.ts \
            components/ui.tsx \
            components/charts.tsx
      - name: "Regression: production CSS build dependencies"
        run: |
          NODE_ENV=production npm install
          node -e "for (const pkg of ['tailwindcss', 'postcss', 'autoprefixer']) require.resolve(pkg)"
          npm run build
          npm install --omit=dev
          node -e "for (const pkg of ['tailwindcss', 'postcss', 'autoprefixer']) require.resolve(pkg)"
          npm run build
      - name: Hostinger-compatible clean install
        run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://aioncrypto.cloud
          NEXT_PUBLIC_ENABLE_INDEXING: "false"
          NEXT_PUBLIC_BACKEND_URL: https://aion-crypto-api.onrender.com

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - name: Audit backend dependencies
        run: |
          python -m pip install pip-audit==2.10.1
          python -m pip_audit -r backend/requirements.txt

  e2e:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://aioncrypto.cloud
          NEXT_PUBLIC_ENABLE_INDEXING: "false"
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:3100
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
