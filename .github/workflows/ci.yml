name: CI

on:
  push:
    branches: [main, develop, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configuration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python scripts/validate_project.py

  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      - name: Validate migration from an empty database
        env:
          DATABASE_URL: sqlite:////tmp/aion-crypto-ci.db
        run: |
          python -m alembic -c alembic.ini upgrade head
          python -m alembic -c alembic.ini check
      - run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Verify clean checkout module graph
        run: |
          test ! -d node_modules
          test ! -d .next
          git ls-files --error-unmatch -- \
            lib/fixtures.ts \
            lib/format.ts \
            lib/api.ts \
            components/ui.tsx \
            components/charts.tsx
      - name: Hostinger-compatible clean install
        run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://aioncrypto.cloud
          NEXT_PUBLIC_ENABLE_INDEXING: "false"
          NEXT_PUBLIC_BACKEND_URL: https://aion-crypto-api.onrender.com

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - name: Audit backend dependencies
        run: |
          python -m pip install pip-audit==2.10.1
          python -m pip_audit -r backend/requirements.txt

  e2e:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://aioncrypto.cloud
          NEXT_PUBLIC_ENABLE_INDEXING: "false"
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
