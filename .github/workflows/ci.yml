name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      - run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true   # report-only until baseline triaged
      - name: Secret scan (basic)
        run: |
          ! grep -rInE "(api[_-]?key|secret|password)\s*=\s*['\"][A-Za-z0-9+/]{16,}" \
            --include="*.py" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=.venv . \
            || (echo "Potential hardcoded secret found" && exit 1)
